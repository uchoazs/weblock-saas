<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Loja</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
    body { background: #f5f5f5; color: #333; }

    header {
      background: #fff;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    header h1 { font-size: 20px; }
    nav a {
      margin-left: 15px;
      text-decoration: none;
      color: #333;
      font-weight: 500;
    }

    .hero {
      padding: 40px 20px;
      text-align: center;
      background: #fff;
    }

    .hero h2 { font-size: 28px; margin-bottom: 10px; }
    .hero p { color: #777; margin-bottom: 20px; }

    .btn {
      padding: 10px 20px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
    }

    .products {
      padding: 30px 20px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card h3 { margin: 10px 0; font-size: 16px; }
    .card p { color: #888; margin-bottom: 10px; }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>

<header>
  <h1>Minha Loja</h1>
  <nav>
    <a href="#">Início</a>
    <a href="#">Produtos</a>
    <a href="#">Contato</a>
  </nav>
</header>

<section class="hero">
  <h2>Produtos que facilitam sua vida</h2>
  <p>Os melhores itens com entrega rápida direto pra você</p>
  <a href="#" class="btn">Ver produtos</a>
</section>

<section class="products">
  <div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Produto 1</h3>
    <p>R$ 49,90</p>
    <a href="#" class="btn">Comprar</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Produto 2</h3>
    <p>R$ 79,90</p>
    <a href="#" class="btn">Comprar</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="">
    <h3>Produto 3</h3>
    <p>R$ 99,90</p>
    <a href="#" class="btn">Comprar</a>
  </div>
</section>

<footer>
  © 2026 Minha Loja - Todos os direitos reservados
</footer>

</body>
</html>
